<!-- index.html -->

<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta charset="UTF-8" />
  <link
    rel="stylesheet"
    href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css"
  />
</head>
<body>
<div id="app"></div>
<script>
  window.$docsify = {
    repo: 'nickopris/Drupal-Activity-Summary',
    loadSidebar: true,
    coverpage: true,
    plugins: [
      function (hook) {
        hook.doneEach(function () {
          // Parse ?id= from the hash fragment, e.g. #/1d-data?id=some-heading
          var hash = window.location.hash
          var match = hash.match(/[?&]id=([^&]*)/)
          if (!match) {
            window.scrollTo(0, 0)
            return
          }
          var targetId = decodeURIComponent(match[1])
          // Docsify renders headings with id attributes; try immediately then
          // retry once after a short delay in case rendering is still settling.
          function scrollTo() {
            var el = document.getElementById(targetId)
            if (el) { el.scrollIntoView() }
          }
          scrollTo()
          setTimeout(scrollTo, 600)
        })
      },
    ]
  };
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
