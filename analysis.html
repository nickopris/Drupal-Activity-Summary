<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drupal AI — Activity Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            drupal: { blue: '#0678BE', dark: '#1a1a2e' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="analysis.css" />
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Header -->
  <header class="bg-drupal-dark text-white px-6 py-4 flex items-center gap-4 shadow-lg">
    <a href="index.html#/README" class="text-gray-400 hover:text-white text-sm">← Docs</a>
    <h1 class="text-xl font-semibold tracking-tight">Drupal AI Activity Analysis</h1>
    <span id="period-label" class="ml-auto text-xs text-gray-400"></span>
  </header>

  <!-- Filters bar -->
  <div class="sticky top-0 z-20 bg-white border-b border-gray-200 shadow-sm px-6 py-3 flex flex-wrap gap-3 items-end">

    <!-- Search -->
    <div class="flex flex-col gap-1 min-w-[200px] flex-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Search</label>
      <input id="search" type="text" placeholder="Title, username, label…"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue" />
    </div>

    <!-- Module -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Module</label>
      <select id="filter-module"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue">
        <option value="">All modules</option>
      </select>
    </div>

    <!-- Type -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Type</label>
      <select id="filter-type"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue">
        <option value="">All types</option>
        <option value="issue">Issues</option>
        <option value="mr">Merge Requests</option>
        <option value="commit">Commits</option>
      </select>
    </div>

    <!-- State -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">State</label>
      <select id="filter-state"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue">
        <option value="">All states</option>
      </select>
    </div>

    <!-- Label -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Label</label>
      <select id="filter-label"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue">
        <option value="">All labels</option>
      </select>
    </div>

    <!-- Username -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Username</label>
      <select id="filter-user"
        class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-drupal-blue">
        <option value="">All users</option>
      </select>
    </div>

    <!-- Reset -->
    <button id="reset-filters"
      class="px-4 py-1.5 rounded text-sm bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-600 font-medium">
      Reset
    </button>

    <!-- Count badge -->
    <span id="result-count" class="ml-auto text-sm text-gray-500 self-end pb-1 whitespace-nowrap"></span>
  </div>

  <!-- Data source error -->
  <div id="load-error" class="hidden mx-6 mt-4 p-4 bg-red-50 border border-red-200 rounded text-red-700 text-sm"></div>

  <!-- Loading -->
  <div id="loading" class="flex items-center justify-center h-40 text-gray-400 text-sm">
    Loading activity data…
  </div>

  <!-- Results grid -->
  <main id="results" class="hidden px-6 py-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></main>

  <!-- Empty state -->
  <div id="empty-state" class="hidden flex-col items-center justify-center h-40 text-gray-400 text-sm">
    No items match the current filters.
  </div>

  <script src="analysis.js"></script>
</body>
</html>
